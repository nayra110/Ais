<!DOCTYPE html>
<html>
<head>
  <title>AIS Tracking Marinesia</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // 🔑 API KEY KAMU
  const API_KEY = "jwBXVNXWIEPRzhnCbVDyMkmCg";

  // ❗ GANTI INI DARI SWAGGER (WAJIB)
  const API_URL = "https://ISI_DARI_SWAGGER_DI_SINI";

  const map = L.map('map').setView([-2.5, 118], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
  }).addTo(map);

  let shipMarkers = {};

  async function loadAIS() {
    try {
      const response = await fetch(API_URL, {
        headers: {
          "x-api-key": API_KEY
        }
      });

      const data = await response.json();

      console.log("DATA MASUK:", data); // 🔍 DEBUG

      // kalau data bukan array (kadang dibungkus)
      const ships = Array.isArray(data) ? data : data.data || data.results || [];

      ships.forEach(ship => {
        const id = ship.mmsi || ship.id || Math.random();

        const lat = ship.latitude || ship.lat || ship.position?.lat;
        const lon = ship.longitude || ship.lon || ship.position?.lon;

        const name = ship.name || ship.vessel_name || "Unknown";
        const speed = ship.speed || ship.sog || 0;

        if (!lat || !lon) return;

        if (shipMarkers[id]) {
          shipMarkers[id].setLatLng([lat, lon]);
        } else {
          const marker = L.marker([lat, lon])
            .addTo(map)
            .bindPopup(`
              <b>${name}</b><br>
              Speed: ${speed} knots
            `);

          shipMarkers[id] = marker;
        }
      });

    } catch (err) {
      console.error("ERROR FETCH:", err);
    }
  }

  loadAIS();
  setInterval(loadAIS, 5000);
</script>

</body>
</html>
