<!DOCTYPE html>
<html>
<head>
  <title>AIS Tracking Marinesia</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const API_KEY = "jwBXVNXWIEPRzhnCbVDyMkmCg";
  const MMSI = "512005706";

  // ✅ ENDPOINT ASLI (INI YANG BENAR)
  const API_URL = `https://api.marinesia.com/api/v1/vessel/${MMSI}/location/latest?key=${API_KEY}`;

  const map = L.map('map').setView([-2.5, 118], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
  }).addTo(map);

  let marker = null;

  async function loadAIS() {
    try {
      const response = await fetch(API_URL);
      const data = await response.json();

      console.log("DATA:", data);

      const lat = data.latitude || data.lat || data.data?.latitude;
      const lon = data.longitude || data.lon || data.data?.longitude;
      const speed = data.speed || data.sog || data.data?.speed || 0;

      if (!lat || !lon) {
        console.log("Koordinat tidak ada");
        return;
      }

      if (marker) {
        marker.setLatLng([lat, lon]);
      } else {
        marker = L.marker([lat, lon])
          .addTo(map)
          .bindPopup(`
            <b>MMSI: ${MMSI}</b><br>
            Speed: ${speed} knots
          `);
      }

      map.setView([lat, lon], 7);

    } catch (err) {
      console.error("ERROR FETCH:", err);
    }
  }

  loadAIS();
  setInterval(loadAIS, 5000);
</script>

</body>
</html>
