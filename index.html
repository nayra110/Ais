<!DOCTYPE html>
<html>
<head>
  <title>AIS Tracking Marinesia</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const API_KEY = "jwBXVNXWIEPRzhnCbVDyMkmCg"; // punyamu

  const map = L.map('map').setView([-2.5, 118], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
  }).addTo(map);

  let shipMarkers = {};

  async function loadAIS() {
    try {
      const response = await fetch("https://api.marinesia.id/ais", {
        headers: {
          "Authorization": `Bearer ${API_KEY}`,
          "Content-Type": "application/json"
        }
      });

      const data = await response.json();

      data.forEach(ship => {
        const id = ship.mmsi || ship.id;
        const lat = ship.latitude || ship.lat;
        const lon = ship.longitude || ship.lon;
        const name = ship.name || "Unknown";
        const speed = ship.speed || 0;

        if (!lat || !lon) return;

        if (shipMarkers[id]) {
          shipMarkers[id].setLatLng([lat, lon]);
        } else {
          const marker = L.marker([lat, lon])
            .addTo(map)
            .bindPopup(`<b>${name}</b><br>Speed: ${speed} knots`);

          shipMarkers[id] = marker;
        }
      });

    } catch (err) {
      console.error("Error:", err);
    }
  }

  loadAIS();
  setInterval(loadAIS, 5000);
</script>

</body>
</html>
