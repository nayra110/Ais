<!DOCTYPE html>
<html>
<head>
  <title>AIS Tracking Indonesia</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([-2.5, 118], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
  }).addTo(map);

  let ships = {};

  const socket = new WebSocket("wss://stream.aisstream.io/v0/stream");

  socket.onopen = () => {
    console.log("Connected to AIS Stream");

    socket.send(JSON.stringify({
      APIKey: "233625ff89679f8bc8dd840b926d66dbe4a0a44b",
      
      // 🇮🇩 Indonesia bounding box
      BoundingBoxes: [
        [[-11, 95], [6, 141]]
      ]
    }));
  };

  socket.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (!msg.Message || !msg.Message.PositionReport) return;

    const ship = msg.Message.PositionReport;

    const lat = ship.Latitude;
    const lon = ship.Longitude;
    const mmsi = ship.UserID;

    if (!lat || !lon) return;

    if (ships[mmsi]) {
      ships[mmsi].setLatLng([lat, lon]);
    } else {
      const marker = L.marker([lat, lon])
        .addTo(map)
        .bindPopup(`MMSI: ${mmsi}`);

      ships[mmsi] = marker;
    }
  };

  socket.onerror = (err) => {
    console.error("WebSocket error:", err);
  };

  socket.onclose = () => {
    console.log("Disconnected");
  };
</script>

</body>
</html>
