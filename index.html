<!DOCTYPE html>
<html>
<head>
  <title>AIS Tracking Indonesia</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script>
  const socket = new WebSocket("wss://stream.aisstream.io/v0/stream");

  socket.onopen = () => {
    console.log("CONNECTED ✅");

    socket.send(JSON.stringify({
      APIKey: "233625ff89679f8bc8dd840b926d66dbe4a0a44b",
      BoundingBoxes: [[[ -11, 95 ], [ 6, 141 ]]]
    }));
  };

  socket.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);

      if (!msg.Message) return;

      // 🔥 support lebih banyak tipe pesan
      const report = msg.Message.PositionReport || msg.Message.StandardClassBPositionReport;

      if (!report) return;

      const lat = report.Latitude;
      const lon = report.Longitude;
      const mmsi = report.UserID;

      if (!lat || !lon) return;

      console.log("Kapal:", mmsi, lat, lon);

    } catch (e) {
      console.log("Parse error");
    }
  };

  socket.onerror = (err) => {
    console.error("ERROR ❌", err);
  };

  socket.onclose = (e) => {
    console.log("CLOSED ❌", e);
  };
</script>

</body>
</html>
